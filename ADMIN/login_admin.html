<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0F172A">
    <title>DelApp | Admin Access</title>
    
    <style>
        /* Stesso stile ultra-premium, ma con tonalità più scure/professionali per l'admin */
        :root {
            --bg-base: #F8FAFC;
            --surface: #FFFFFF;
            --text-main: #0F172A;
            --text-sec: #64748B;
            --accent: #0F172A; /* Scurito per l'admin */
            --accent-glow: rgba(15, 23, 42, 0.15);
            --input-bg: #F1F5F9;
            --input-border: #E2E8F0;
            --danger: #EF4444;
            --font-stack: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-stack); background-color: var(--bg-base); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; background-image: radial-gradient(circle at 50% 0%, var(--accent-glow) 0%, transparent 60%); }
        
        @keyframes slideUpFade { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-8px); } 100% { transform: translateY(0px); } }

        .app-layout { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 2rem; max-width: 480px; margin: 0 auto; width: 100%; animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .hero { margin-bottom: 3rem; text-align: center; }
        .icon-box { width: 100px; height: 100px; display: flex; justify-content: center; align-items: center; margin: 0 auto 1.5rem auto; animation: float 4s ease-in-out infinite; }
        .logo { width: 150px; height: 150px; object-fit: contain; }
        .title { font-size: 2.2rem; font-weight: 800; letter-spacing: -1px; line-height: 1.1; margin-bottom: 0.5rem; }
        .subtitle { font-size: 1rem; color: var(--text-sec); font-weight: 500; }

        .input-group { position: relative; margin-bottom: 1.25rem; }
        .input-icon { position: absolute; left: 1.25rem; top: 50%; transform: translateY(-50%); color: var(--text-sec); width: 20px; height: 20px; pointer-events: none; transition: color 0.3s ease; }
        .input-field { width: 100%; background-color: var(--surface); border: 1px solid var(--input-border); padding: 1.25rem 1.25rem 1.25rem 3.5rem; border-radius: 18px; font-size: 1.05rem; font-weight: 600; color: var(--text-main); outline: none; transition: all 0.3s ease; }
        .input-field::placeholder { color: #94A3B8; font-weight: 500; }
        .input-field:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-glow), 0 4px 12px rgba(0,0,0,0.05); }
        .input-field:focus + .input-icon { color: var(--accent); }
        
        #login-pin { letter-spacing: 0.5rem; font-family: monospace; font-size: 1.2rem; }

        .btn-submit { width: 100%; background: var(--accent); color: white; border: none; padding: 1.25rem; border-radius: 18px; font-size: 1.1rem; font-weight: 700; margin-top: 1.5rem; cursor: pointer; box-shadow: 0 10px 25px -6px rgba(15, 23, 42, 0.5); transition: all 0.2s ease; }
        .btn-submit:active { transform: scale(0.96); box-shadow: 0 5px 15px -5px rgba(15, 23, 42, 0.5); }

        .error-toast { display: none; background-color: #FEF2F2; color: var(--danger); border-radius: 14px; padding: 1rem; font-size: 0.9rem; font-weight: 600; text-align: center; margin-top: 1.5rem; border: 1px solid #FECACA; }
    </style>
</head>
<body>

    <div class="app-layout">
        <div class="hero">
            <div class="icon-box">
               <img src="assets/images/logo2.png" alt="Logo" class="logo">
            </div>
            <h1 class="title">Bentornato</h1>
            <p class="subtitle">Accesso riservato all'amministrazione</p>
        </div>

       <form id="loginForm">
            <div class="input-group">
                <input type="email" id="login-email" class="input-field" placeholder="Email Amministratore" required>
                <svg class="input-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" />
                </svg>
            </div>
            
            <div class="input-group">
                <input type="password" id="login-pin" class="input-field" placeholder="Password di sicurezza" required style="letter-spacing: normal; font-family: inherit;">
                <svg class="input-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <button type="submit" id="btn-login" class="btn-submit">Accedi al Gestionale</button>
        </form>

        <div id="login-error" class="error-toast">
            Credenziali non valide. Riprova.
        </div>
    </div>

    <script src="functions/login_admin.js" type="module"></script>
</body>
</html>
