<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="/manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DelApp - Gestione Operativa</title>
    <link rel="stylesheet" href="master_fico.css">
    
    <style>
        body {
            display: flex;
            flex-direction: column;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-color: #f8fafc;
        }
        .topbar {
            width: 100%;
            position: relative;
            z-index: 1010;
        }
        .app-main-container {
            display: flex;
            flex: 1;
            width: 100%;
            position: relative;
        }
        .sidebar {
            position: relative !important; 
            top: 0 !important;
            height: auto !important;
            min-height: calc(100vh - 86px);
        }
        .main-content {
            flex: 1;
            padding: 2rem;
            background-color: #f8fafc;
        }
        /* REGOLE SPECIFICHE PER LA STAMPA DEI REPORT */
        @media print {
            /* Nasconde menu, intestazione superiore e tutti i bottoni interattivi */
            .topbar, .sidebar, button, input[type="month"] {
                display: none !important;
            }

            /* Sblocca le altezze e gli scorrimenti per far scendere il testo sui fogli */
            body, html, .app-main-container, .main-content, #view-container, .table-responsive {
                display: block !important;
                height: auto !important;
                min-height: auto !important;
                max-height: none !important;
                overflow: visible !important;
                margin: 0 !important;
                padding: 0 !important;
                background-color: white !important;
            }

            /* Evita che le schede delle società vengano tagliate a metà tra due pagine */
            .card {
                break-inside: avoid;
                page-break-inside: avoid;
                border: 1px solid #cbd5e1 !important;
                box-shadow: none !important;
                margin-bottom: 40px !important;
                padding: 0 !important;
            }

            /* Ottimizza i testi per la lettura su carta */
            body {
                color: black !important;
                font-size: 12pt !important;
            }
            
            /* Rimuove i colori di sfondo inutili per risparmiare inchiostro */
            #view-container {
                background: transparent !important;
            }
        }
    </style>
</head>
<body>
    
    <header class="topbar" style="background: #ffffff; border-bottom: 1px solid #e2e8f0; padding: 0.5rem 2rem;">
        <div class="wrap" style="display: flex; align-items: center; width: 100%; gap: 1rem;">
            <div class="logo-wrap">
                 <img src="./assets/images/logo2.png" alt="Logo" width="70" height="70" class="logo-img">
            </div>
            <div class="title-block">
              <h1 id="pageTitle" style="margin:0; font-size: 1.6rem; font-weight: 700; color: #0f172a;">DelApp</h1>
              <p id="pageSubtitle" style="margin:0; font-size: 0.85rem; color: #64748b; font-weight: 500;">Gestionale</p>
            </div>
            
            <div style="flex:1"></div>
            
            <div class="user-chip-wrap" id="userArea" style="display:none; position: relative;">
              <button class="user-chip" id="userBtn" aria-label="Menu Utente" style="cursor: pointer; background: #f1f5f9; border: 1px solid #e2e8f0; padding: 0.5rem; border-radius: 50%;">
                <span class="avatar" id="userAvatar">👤</span>
              </button>
              
              <div class="logo-menu" id="userMenu" style="display: none; position: absolute; right: 0; top: 100%; background: #1e293b; color: white; padding: 10px; border-radius: 8px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); z-index: 1020; min-width: 200px; margin-top: 8px;">
                <div class="logo-menu__item" style="cursor:default; opacity:0.7; border-bottom:1px solid rgba(255,255,255,0.1); margin-bottom:5px; padding: 4px 8px;">
                   <small id="userNameDisplay">Amministrazione</small>
                </div>
                
                <button class="logo-menu__item" onclick="changeView('profile'); document.getElementById('userMenu').style.display='none';" style="width: 100%; text-align: left; background: transparent; border: none; color: white; padding: 8px; cursor: pointer; font-weight: 600; font-size: 0.85rem; border-radius: 6px; transition: background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='transparent'">
                    👤 Il Mio Profilo
                </button>

                <button class="logo-menu__item" onclick="changeView('staff'); document.getElementById('userMenu').style.display='none';" style="width: 100%; text-align: left; background: transparent; border: none; color: white; padding: 8px; cursor: pointer; font-weight: 600; font-size: 0.85rem; border-radius: 6px; transition: background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='transparent'">
                    👥 Gestione Staff
                </button>

                <button class="logo-menu__item" onclick="changeView('settings'); document.getElementById('userMenu').style.display='none';" style="width: 100%; text-align: left; background: transparent; border: none; color: white; padding: 8px; cursor: pointer; font-weight: 600; font-size: 0.85rem; border-radius: 6px; transition: background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='transparent'">
                    ⚙️ Configurazioni
                </button>
                
                <div style="height: 1px; background: rgba(255,255,255,0.1); margin: 5px 0;"></div>
                
                <button class="logo-menu__item" id="btnLogout" style="width: 100%; text-align: left; background: transparent; border: none; color:#ef4444; padding: 8px; cursor: pointer; font-weight: 600; font-size: 0.85rem; border-radius: 6px; transition: background 0.2s;" onmouseover="this.style.background='rgba(239,68,68,0.1)'" onmouseout="this.style.background='transparent'">
                    🚪 Logout
                </button>
              </div>
            </div>
        </div>
    </header>

    <div class="app-main-container">
        
        <nav class="sidebar" id="app-sidebar">
            <ul class="nav-links">
                <li><a href="#" class="active" data-view="dashboard">Dashboard Admin</a></li>
                <li><a href="#" data-view="tasks">Task e Planning</a></li>
                <li><a href="#" data-view="rooms">Strutture e Proprietari</a></li>
                <li><a href="#" data-view="reports">Statistiche e Flussi</a></li>
                <li><a href="#" data-view="billing">Fatturazione</a></li>
                <li><a href="#" data-view="magazzino">Magazzino</a></li>
            </ul>

            <div style="position: absolute; bottom: calc(var(--spacing-md) + 60px); left: var(--spacing-md); width: calc(100% - (var(--spacing-md) * 2)); box-sizing: border-box; z-index: 10;">
                <button onclick="changeView('add-task')" style="
                    width: 100%;
                    background: #3b82f6;
                    color: white;
                    border: none;
                    border-radius: 12px;
                    padding: 0.85rem 1rem;
                    font-weight: 700;
                    font-size: 0.95rem;
                    cursor: pointer;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    gap: 0.5rem;
                    box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3);
                    transition: all 0.2s ease;
                " onmouseover="this.style.background='#2563eb'; this.style.transform='translateY(-2px)';" 
                  onmouseout="this.style.background='#3b82f6'; this.style.transform='translateY(0)';">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    Nuovo Task
                </button>
            </div>
        </nav>

        <main class="main-content" id="app-content">
            <section id="view-container" class="view-container"></section>
        </main>

    </div>

    <div id="modal-container"></div>
    
    <script type="module" src="functions/index.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                .then(registration => {
                    console.log('Service Worker registrato con successo. Scope:', registration.scope);
                })
                .catch(error => {
                    console.error('Errore nella registrazione del Service Worker:', error);
                });
            });
        }
    </script>
</body>
</html>
